# Turbo Anima — DP-DMD distillation (docs: docs/experimental/dpdmd.md).
#
# Read by scripts/distill_turbo/ — NOT by train.py. Schema is bespoke
# (sections instead of flat kwargs). Don't `python tasks.py print-config METHOD=turbo`.
#
# Diversity-Preserved DMD (Wu et al., arXiv:2602.03139) on a frozen Anima DiT:
# an N-step rollout student whose first step is supervised toward a teacher
# K-step CFG anchor (diversity) then detached, with DMD refining x_θ over steps
# 2..N (quality) against a co-trained fake/critic LoRA. Output
# `output/ckpt/anima_turbo.safetensors` is a normal LoRA — load it through the
# standard inference path with --infer_steps 2 --cfg 1.0 (CFG is baked into the
# student during distillation).

output_name = "anima_turbo_L2"
dit_path = "models/diffusion_models/anima-base-v1.0.safetensors"
data_dir = "post_image_dataset/lora"
output_dir = "output/ckpt"

iterations = 1000
batch_size = 1
seed = 42
use_custom_down_autograd = true
use_masked_loss = true

gradient_checkpointing = false
unsloth_offload_checkpointing = false

# Diversity mechanism. "dpdmd" (default) runs the first-step teacher anchor below;
# "dmd" is plain DMD2 — no anchor, so student_steps may be 1 (a true single-step
# student, which dpdmd structurally can't produce). Pair "dmd" with [gad] to
# restore initial-noise sensitivity geometrically instead of via the anchor.
base_loss = "dmd"

[network]
student_rank = 64
student_alpha = 64
fake_rank = 64
fake_alpha = 64
attn_mode = "flash"
# Per-step expert: split the student into K = student_steps up-heads off a
# shared down-proj, head k serving denoise step k. Removes the diversity↔quality
# tug-of-war (step 0 vs steps 1..N) in shared up-weights. Default off — the
# single-head student stays the shipped path. NOTE: output is NOT a plain LoRA
# (kept-live only; `make merge` refuses it, stock ComfyUI LoRA loaders can't
# drive per-step head selection — use AnimaTurboPerStepExpertLoader).
per_step_expert = false

# DMD schedule.
[dmd]
student_steps = 4               # N — student rolls N Euler steps; inference matches (--infer_steps 2)
teacher_cfg = 4                 # CFG scale baked into the teacher anchor + DMD real score (Anima prod CFG=4)
dm_x0_norm = true               # per-sample x0-space magnitude normalization of the DM gradient
norm_floor = 0.05               # clamp_min for the dm_x0_norm denominator (latent scale)
grad_step = "random"            # which rollout step carries gradient (base_loss='dmd'):
                                #   "random" — canonical DMD2 multistep: each iter samples
                                #              g~U{0..N-1}, backward-simulates to g under
                                #              no_grad, grads ONLY step g's one-step
                                #              x0-prediction. Supervises EVERY grid point
                                #              (not just the clean tail). Memory-flat.
                                #   "last"   — only the final, cleanest-σ step (memory-flat,
                                #              but the noisy steps train only indirectly).
                                #   "all"    — full-rollout BPTT (holds N forward graphs).
                                # "random"/"all" are per_step_expert-compatible; "last" is not
                                # (only the final head would train). See gad.md.

# Optimization.
[optim]
student_lr = 2e-5
fake_lr = 2e-5
fake_steps_per_student_step = 4
fake_warmup_steps = 50          # fake (critic) head-start: number of fake-only gradient
                                # updates BEFORE the main loop, so the critic is calibrated
                                # against the student's (init ≈ teacher) x_pred before the
                                # student LR warmup (~40 steps) ramps to full strength —
                                # kills the early grad_signal_rms spike (~step 50). Counted
                                # in fake updates DIRECTLY (decoupled from
                                # fake_steps_per_student_step — bumping the cadence no longer
                                # rescales the head-start). 400 ≈ the old 100×4 magnitude.
                                # The fake LR scheduler is sized over
                                # (iterations·fake_steps_per_student_step + fake_warmup_steps)
                                # and stepped through this phase, so its 0.02 LR warmup
                                # overlaps the head-start; student schedule untouched. 0 = off.
weight_decay = 0.0
grad_clip = 1.0                 # student grad-norm cap

# DP-DMD diversity anchor. Step 1 of the N-step student rollout is supervised
# toward a teacher K-step CFG anchor (the diverse landing point) then detached;
# DMD refines x_θ over steps 2..N. teacher_cfg (above) is the anchor's CFG scale;
# student_steps is N.
[dpdmd]
k_anchor = 6                    # teacher steps rolled to the diversity anchor (their K)
teacher_anchor_steps = 12        # teacher σ-grid the K is counted against
div_weight = 0.05               # λ on the first-step diversity MSE
detach_after_first = true       # load-bearing stop-grad after step 1 (A/B only)

# Geometry-Aware Distillation (GAD; Huang et al., arXiv:2606.01651).
#
# An orthogonal Jacobian-vector-product regularizer that restores the distilled
# student's *sensitivity to the initial noise* — the property standard pointwise
# distillation flattens (→ seed mode-collapse, dead noise-control). Each step we
# perturb the renoised DMD latent x_t by h·v and match the student's local score
# response Δε to the teacher's (Eq.9). It folds into the SAME DMD2 surrogate as
# the DM gradient (a detached latent-space signal · x_pred) — ~2 extra no_grad
# forwards, zero extra backward graph. Composes with EITHER base_loss.
#
# weight=0 disables (default — shipped behavior unchanged). It's the diversity
# mechanism for the base_loss="dmd" + student_steps=1 replacement arm; it can
# also stack on dpdmd as an extra local-geometry shield. Their fixed h=1e-2 was
# best (Table 9). CAUTION: a hard-routed fake/critic can route-flip across the
# perturbation, making Δε_fake discontinuous — keep h small there.
[gad]
weight = 1.0
h = 0.01

# τ sampling distribution for the fake/critic update (+ fake warmup).
[sampling]
t_distribution = "uniform"      # "uniform" or "sigmoid"
sigmoid_scale = 1.0
flow_shift = 3.0                # σ-schedule shift for the DP-DMD Euler grids (matches inference)

# Mean-variance regularization (lever B / paper Eq. 7; proposal §3.B, run S2).
#
# A KL of each generated image's per-image Gaussian (μ_i, σ²_i) toward the
# real-latent target (μ_t, σ²_t):
#   L_mv = (1/B) Σ ½[ (σ_i² + (μ_i − μ_t)²)/σ_t² − 1 − log(σ_i²/σ_t²) ]
# added to the student loss with `weight`. It directly clamps the variance
# INFLATION that IS the over-bake's oversaturation (paper §3.2), so it stacks
# on the DM shield as a cheap second shield. weight=0 disables (default).
# For run S2 use a small weight (~0.01–0.05).
#
# Target stats: leave `sigma2_t <= 0` to measure both μ_t and σ²_t EXACTLY in a
# one-pass scan over the real latents (recommended for Anima's 16-ch VAE — the
# paper's SDXL μ_t=0.075/σ²_t=0.81 don't transfer). The target is a static
# dataset statistic, so the exact scan beats a running EMA (no decay lag / batch
# wobble, deterministic). Set `sigma2_t > 0` to pin explicit values.
[mean_var]
weight = 0.0
mu_t = 0.0                      # used only when sigma2_t > 0 (pinned target)
sigma2_t = -1.0                 # <= 0 → measure μ_t/σ²_t exactly from real latents
calib_batches = 0              # cap the calibration scan (0 = full pass)

# Logging / checkpoints.
[io]
save_every = 1000
log_interval = 5
log_dir = "output/logs/turbo"
validate_every_n_steps = 500
