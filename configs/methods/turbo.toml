# Turbo Anima — Decoupled DMD distillation (docs: docs/experimental/dmd2-decoupled.md).
#
# Read by scripts/distill_turbo/ — NOT by train.py. Schema is bespoke
# (sections instead of flat kwargs). Don't `python tasks.py print-config METHOD=turbo`.
#
# Trains two LoRA stacks on one frozen Anima DiT via Liu et al. (arXiv:2511.22677)
# Decoupled-Hybrid DMD2. Output `output/ckpt/anima_turbo.safetensors` is a normal
# LoRA — load it through the standard inference path with --infer_steps 4 --cfg 1.0
# (CFG is baked into the student during distillation).

output_name = "anima_turbo_F96"
dit_path = "models/diffusion_models/anima-base-v1.0.safetensors"
data_dir = "post_image_dataset/lora"
output_dir = "output/ckpt"

iterations = 2000
batch_size = 1
seed = 42
use_custom_down_autograd = true

# Masked loss (student-only): when true, the per-image foreground mask multiplies
# the student DMD2 gradient so distribution-matching focuses on the subject;
# the fake/critic regression is left full-frame.
use_masked_loss = false

[network]
student_rank = 96
student_alpha = 96
fake_rank = 96
fake_alpha = 96
attn_mode = "flash"

# DMD2 schedule (proposal §Schedule, paper Table 1 row 4: Decoupled-Hybrid).
[dmd]
student_steps = 4               # production target — sampler runs 4 Euler steps at inference
teacher_cfg = 4               # α — matches Anima's production CFG=4 (baked into student)
tau_ca_strategy = "above_t"     # τ_CA > t  (CA focuses on still-unresolved content)
tau_dm_strategy = "uniform"     # τ_DM ∈ [0, 1]  (DM corrects global artifacts)
tau_ca_min_gap = 0.05           # clamp τ_CA ≥ t + this gap (proposal R5: late-step stability)
tau_ca_skip_above_t = 0.95      # if generator t > this, skip CA branch (DM-only that step)
dm_x0_norm = true
norm_floor = 0.05               # clamp_min for the (b) denominator (latent scale); inert under (a)

# Optimization.
[optim]
student_lr = 2e-5
fake_lr = 3e-5
fake_steps_per_student_step = 2
fake_warmup_steps = 50         # fake (critic) head-start: fake-only updates BEFORE the
                                # main loop, so the critic is calibrated against the student's
                                # (init ≈ teacher) x_pred before the student LR warmup (~40 steps)
                                # ramps to full strength — kills the early grad_signal_rms spike
                                # (~step 50). The fake LR scheduler is sized over
                                # (iterations + fake_warmup_steps) and stepped through this phase,
                                # so its 0.02 LR warmup overlaps the head-start; student schedule
                                # untouched. 0 = off.
alpha_warmup_steps = 1000       # linear ramp α_eff: 1.0 → teacher_cfg over these steps
weight_decay = 0.0
grad_clip = 1.0                 # student grad-norm cap

# Generator-t sampling distribution.
[sampling]
t_distribution = "uniform"      # "uniform" or "sigmoid"
sigmoid_scale = 1.0

# CA band-deficit feedback (item 2 — `item2_plan.md`).
#
# Per-sample reweighting of δ_cfg = v_real_cond - v_real_uncond by where the
# student's FEI lags the teacher's:
#   w_high = 1 + β·relu(e_high_T - e_high_S)
#   w_low  = 1 + β·relu(e_low_T  - e_low_S)
#   δ_cfg' = w_low·LP(δ_cfg) + w_high·HP(δ_cfg)
# Because `e_low + e_high ≡ 1`, only one branch can fire per sample; phase 0
# on turbo_C found the student over-fills LF, so w_high is the active arm.
# Defaults are pinned by the n=90 paired-gap probe (bench/fera_artist/
# results/20260528-1902-turbo_C_phase0/): div=16 SNR=2.25 @ stage 2.
[ca_band_weight]
enabled = true
beta = 0.2                      # band-deficit gain (0 = bit-identical to no-band-weighting)
divisor = 16                    # σ_low = min(H_lat, W_lat) / divisor (phase 0 winner)
window_lo = 0.30                # gate band-weighting OFF when τ_ca < window_lo
window_hi = 0.95                # gate OFF when τ_ca ≥ window_hi (stage-0 degenerate noise band)

# Logging / checkpoints.
[io]
save_every = 1000
log_interval = 5
log_dir = "output/logs/turbo"
