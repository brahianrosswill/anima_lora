# Turbo Anima — Decoupled DMD distillation (docs: docs/experimental/dmd2-decoupled.md).
#
# Read by scripts/distill_turbo/ — NOT by train.py. Schema is bespoke
# (sections instead of flat kwargs). Don't `python tasks.py print-config METHOD=turbo`.
#
# Trains two LoRA stacks on one frozen Anima DiT via Liu et al. (arXiv:2511.22677)
# Decoupled-Hybrid DMD2. Output `output/ckpt/anima_turbo.safetensors` is a normal
# LoRA — load it through the standard inference path with --infer_steps 4 --cfg 1.0
# (CFG is baked into the student during distillation).

output_name = "anima_turbo_I"
dit_path = "models/diffusion_models/anima-base-v1.0.safetensors"
data_dir = "post_image_dataset/lora"
output_dir = "output/ckpt"

# Student objective:
#   "dmd2"  — incumbent CA-decoupled DMD2 (the [dmd]/[optim] α-ramp path below).
#   "dpdmd" — Phase-1 Diversity-Preserved DMD (arXiv 2602.03139): N-step rollout
#             student, first step supervised toward a teacher K-step anchor then
#             detached, DMD on x_θ over steps 2..N. The CA branch / α-ramp knobs
#             (teacher_cfg is still used for the anchor CFG, tau_ca_*, alpha_*) are
#             inert under dpdmd. See docs/proposal/dpdmd.md and the [dpdmd] block.
objective = "dpdmd"

iterations = 250
batch_size = 1
seed = 42
use_custom_down_autograd = true

# Masked loss (student-only): when true, the per-image foreground mask multiplies
# the student DMD2 gradient so distribution-matching focuses on the subject;
# the fake/critic regression is left full-frame.
use_masked_loss = true

# Curation gate (item 5; see item5_plan.md). When true, training reads only the
# stems in the keep_list.json from `make exp-turbo-prep` (the noise/HF-curated
# high-signal subset) instead of the full pool.
use_prep_list = false

[network]
student_rank = 64
student_alpha = 64
fake_rank = 64
fake_alpha = 64
attn_mode = "flash"

# DMD2 schedule (proposal §Schedule, paper Table 1 row 4: Decoupled-Hybrid).
[dmd]
student_steps = 2               # production target — sampler runs 4 Euler steps at inference
teacher_cfg = 4               # α — matches Anima's production CFG=4 (baked into student)
tau_ca_strategy = "above_t"     # τ_CA > t  (CA focuses on still-unresolved content)
tau_dm_strategy = "uniform"     # τ_DM ∈ [0, 1]  (DM corrects global artifacts)
tau_ca_min_gap = 0.05           # clamp τ_CA ≥ t + this gap (proposal R5: late-step stability)
tau_ca_skip_above_t = 0.95      # if generator t > this, skip CA branch (DM-only that step)
dm_x0_norm = true
norm_floor = 0.05               # clamp_min for the (b) denominator (latent scale); inert under (a)

# Optimization.
[optim]
student_lr = 2e-5
fake_lr = 3e-5
fake_steps_per_student_step = 4
fake_warmup_steps = 50          # fake (critic) head-start: number of fake-only gradient
                                # updates BEFORE the main loop, so the critic is calibrated
                                # against the student's (init ≈ teacher) x_pred before the
                                # student LR warmup (~40 steps) ramps to full strength —
                                # kills the early grad_signal_rms spike (~step 50). Counted
                                # in fake updates DIRECTLY (decoupled from
                                # fake_steps_per_student_step — bumping the cadence no longer
                                # rescales the head-start). 400 ≈ the old 100×4 magnitude.
                                # The fake LR scheduler is sized over
                                # (iterations·fake_steps_per_student_step + fake_warmup_steps)
                                # and stepped through this phase, so its 0.02 LR warmup
                                # overlaps the head-start; student schedule untouched. 0 = off.
alpha_warmup_steps = 250       # linear ramp α_eff: 1.0 → teacher_cfg over these steps
weight_decay = 0.0
grad_clip = 1.0                 # student grad-norm cap

# DP-DMD (Phase 1; objective = "dpdmd"). Diversity-Preserved DMD, arXiv 2602.03139.
# Step 1 of the N-step student rollout is supervised toward a teacher K-step CFG
# anchor (the diverse landing point) then detached; DMD refines x_θ over steps
# 2..N. teacher_cfg (above) is the anchor's CFG scale; student_steps is N.
[dpdmd]
k_anchor = 12                    # teacher steps rolled to the diversity anchor (their K)
teacher_anchor_steps = 28       # teacher σ-grid the K is counted against
div_weight = 0.05               # λ on the first-step diversity MSE
detach_after_first = true       # load-bearing stop-grad after step 1 (A/B only)

# Generator-t sampling distribution.
[sampling]
t_distribution = "uniform"      # "uniform" or "sigmoid"
sigmoid_scale = 1.0
flow_shift = 3.0                # σ-schedule shift for the DP-DMD Euler grids (matches inference)

# Mean-variance regularization (lever B / paper Eq. 7; proposal §3.B, run S2).
#
# A KL of each generated image's per-image Gaussian (μ_i, σ²_i) toward the
# real-latent target (μ_t, σ²_t):
#   L_mv = (1/B) Σ ½[ (σ_i² + (μ_i − μ_t)²)/σ_t² − 1 − log(σ_i²/σ_t²) ]
# added to the student loss with `weight`. It directly clamps the variance
# INFLATION that IS the over-bake's oversaturation (paper §3.2), so it stacks
# on the DM shield as a cheap second shield. weight=0 disables (default).
# For run S2 use a small weight (~0.01–0.05).
#
# Target stats: leave `sigma2_t <= 0` to measure both μ_t and σ²_t EXACTLY in a
# one-pass scan over the real latents (recommended for Anima's 16-ch VAE — the
# paper's SDXL μ_t=0.075/σ²_t=0.81 don't transfer). The target is a static
# dataset statistic, so the exact scan beats a running EMA (no decay lag / batch
# wobble, deterministic). Set `sigma2_t > 0` to pin explicit values.
[mean_var]
weight = 0.0
mu_t = 0.0                      # used only when sigma2_t > 0 (pinned target)
sigma2_t = -1.0                 # <= 0 → measure μ_t/σ²_t exactly from real latents
calib_batches = 0              # cap the calibration scan (0 = full pass)

# Logging / checkpoints.
[io]
save_every = 500
log_interval = 5
log_dir = "output/logs/turbo"
