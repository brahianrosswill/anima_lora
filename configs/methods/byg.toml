# BYG — Bootstrap Your Generator: unpaired instruction editing (v1).
#
# A plain rank-64 LoRA trained with a multi-forward unpaired objective (bootstrap
# rollout + DDS prior + cycle + identity), conditioned on a parameter-free
# token-concat source latent. NO paired (source, edited) data and NO reward model
# — only unpaired images + (src/tgt caption, instruction, reverse) tuples.
#
# The trainable weights are an ordinary Anima LoRA (network_module below); all
# BYG behaviour lives in BYGMethodAdapter (networks/methods/byg.py), which owns
# the whole training step and installs the source-concat conditioning patch.
# Output is a plain LoRA, loadable by the standard loader (inference installs the
# same concat patch). See docs/proposal/byg_unpaired_editing.md and the paper
# (arXiv 2606.03911, Alg. 1).
#
# Data: run scripts/byg/build_edit_tuples.py first to emit per-image
#   post_image_dataset/byg/<stem>_byg.safetensors (4 encoded role conditionings).
#   The image VAE/TE caches are the standard post_image_dataset/lora ones (the
#   source image IS the training image — no separate cond cache needed).

# Standard plain LoRA (no MoE, no routing). rank 64 per the paper (App. B.1).
network_module = "networks.lora_anima"
network_dim = 64
network_alpha = 64

output_name = "anima_byg"

logging_dir = "output/logs"
log_with = "tensorboard"

# Paper App. B.1: lr 3e-4, AdamW wd 1e-2. Epoch-based here (the repo trains by
# epochs); ~30k steps in the paper at bs 8.
learning_rate = 3e-4
optimizer_args = ["weight_decay=1e-2"]
max_train_epochs = 8
save_every_n_epochs = 2
checkpointing_epochs = 2

# --- BYG objective (read by BYGMethodAdapter via args) ---
use_byg = true
byg_lambda_prior = 1.0
byg_lambda_id = 0.2
byg_lambda_cycle = 1.0
byg_alpha = 0.1
byg_rollout_steps = 10
byg_snapshot_every = 200      # v1 snapshot bootstrap (EMA-free)
byg_ema_decay = 0.0           # > 0 enables paper-faithful per-step EMA
byg_identity_warmup_steps = 200
byg_identity_prob = 0.15
byg_prior_symmetric = false   # v1: fwd-only prior (symmetric = paper Eq. 5)
byg_text_dir = "post_image_dataset/byg"

# BYG drives many DiT forwards per step; the block-swap offloader desyncs on a
# second forward, so it must stay off (BYGMethodAdapter asserts this).
blocks_to_swap = 0
gradient_checkpointing = true
# Plain torch checkpoint (NOT unsloth CPU-offload): BYG runs many forwards per
# step and the offloader desyncs on a second forward
# (project_blockswap_extra_forwards_gradcache).
unsloth_offload_checkpointing = false

# No caption dropout — the instruction/captions are the supervision signal.
caption_dropout_rate = 0.0
