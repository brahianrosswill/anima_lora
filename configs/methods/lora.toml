# OrthoHydra centered-gate init (function-preserving step-0 router gradient).
# Recenters the gate to (g_e - 1/E), zero-inits the router (exactly uniform at
# step 0), and starts λ at ortho_lambda_init. ΔW=0 at init yet router logits
# get gradient from step 0 (disjoint P_e survive the mean subtraction).
# Watch ortho/router_grad_norm (>0 from step 0), ortho/grad_coupling (cross-
# expert loss-geometry coupling), ortho/subspace_overlap (structural guardrail).
# NOTE: distilled _moe checkpoints drop the -(1/E)Σ_e P_e bias → train/research
# only until the router-live node subtracts the mean expert (see ortho.py).
# ortho_centered_gate = true
# ortho_lambda_init = 1e-2     # auto-bumped from 0 when centered_gate is on


