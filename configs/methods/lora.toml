# -------------
# Text-routed pool (route_per_layer=false + router_source="crossattn_emb")
#
# One network-level GlobalRouter routes the whole pool by PROMPT CONTENT —
# it reads the pooled post-LLM-adapter cross-attn text vector (the DiT's
# K/V), not σ / noise-frequency. Works with shared_A (Hydra) or
# independent_A (FeRA-style) layouts. The router pools (B,L,D)→(B,D) over the
# sequence axis and LayerNorms before the MLP; gates fire per cond/uncond
# branch at inference. Caveat: experts specialize by caption regime, a
# different inductive bias from FEI/σ routing — bench before adopting.

# use_moe_style = "shared_A"
# route_per_layer = false
# router_source = "crossattn_emb"
# num_experts = 6
# balance_loss_weight = 2e-7
# balance_loss_warmup_ratio = 0.4
# router_targets = ".*\\.(qkv_proj|q_proj|kv_proj|output_proj|layer[12])$"
# output_name = "anima_crossattn_routed"

# -------------
# Variance-reduced FM loss (AsymFlow §5.2, arXiv:2605.12964). One extra
# no-grad forward per step on the FEI-low-passed latent, with an online
# control-variate λ. The control-variate forward reuses the trainable DiT
# with adapter multiplier=0 (equivalent to a frozen base DiT for LoRA-family
# runs), so there is no extra model copy in VRAM — only ~+40% step compute.
# See bench/fm_vr_headroom/proposal.md.
# vr_loss_weight = 1.0
# vr_fei_sigma_low_div = 4.0

# -------------
# REPA v2 — encoder-alignment aux loss (docs/experimental/repa.md).
#
# Aligns a mid-block DiT feature to cached PE-Spatial patch tokens — a training-
# time regularizer, orthogonal to the routing axes above (composes with the
# default stack). PREREQ: `make preprocess-pe-spatial` to cache
# {stem}_anima_pe_spatial.safetensors sidecars first.
#
#   repa_mode = "relational"  → Gram / relational-KD form (no head, domain-offset
#                               cancelled). Phase-0 WINNER (2026-06-12, ~6:4–7:3
#                               over absolute on eyeballed grids; corroborated by
#                               iREPA arXiv:2512.10794) — the default.
#             = "absolute"     → paper-faithful per-token cosine + MLP head.
#                               Reference only; don't spend runs on it.
#
# Phase-1 operating-point levers (anneal/cutoff, spatial norm, token-subset Gram):
# docs/experimental/repa.md §"Annealing plan". spatial_norm is validated + ON
# below; anneal stays off pending its A/B (candidate 0.25); lever 3 closed.
use_repa       = true
repa_mode      = "relational"
repa_weight    = 0.05          # vs v1's 0.5 — late-run gradient is where style drifts
repa_layer     = 26            # block to hook (of 28)
repa_encoder   = "pe_spatial"
repa_lr_scale  = 1.0          # head LR multiplier (absolute mode only)
repa_spatial_norm = false
# repa_anneal_steps = 0.5

# Lever 1 — hard cutoff (HASTE): (0,1] = fraction of the run, >1 = absolute
# optimizer steps, 0 = off. Candidate: 0.25 — the quarter-run align_loss curve
# plateaus by ~18% of the run (anima_repa_normed_quarter, 2026-06-12).
# repa_anneal_steps = 0.25

# REPA-DoG (docs/proposal/repa_dog_target.md) — band-pass the alignment TARGET
# before the Gram match, generalizing spatial_norm's DC removal to a broader
# low-band strip (arXiv:2603.14645v1 §3.5). When on it REPLACES the spatial_norm
# block (DoG at σ₁→0 *is* DC removal — same family, mutually exclusive). Pure
# target-side preprocessing: byte-identical no-op when off, can't regress non-DoG
# runs. Phase 0 PASSED (bench/repa/probe_dog_target.py, 2026-06-13): broad low-
# band strip beats spatial_norm on all 3 content axes, character peaks at σ₁=min/16.
# A/B (vs spatial_norm) still open — flip true with σ₂ off, HOLD norm_std=0 so the
# only change vs baseline is the band-pass (the paper's std confound, Table 6).
repa_target_dog     = true   # true ⇒ DoG band-pass the target (replaces spatial_norm)
repa_dog_sigma1_div = 16      # σ₁ = min(gh,gw)/div; Phase-0 character winner = 16
repa_dog_sigma2_div = 0       # 0 ⇒ σ₂ off (low-band strip only, +1a); >sigma1_div ⇒ band-pass
repa_dog_norm_std   = 0       # 0 ⇒ empirical std (matches spatial_norm); >0 ⇒ fixed const

