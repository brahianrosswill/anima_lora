# Colorize — EasyControl control task (B&W manga / lineart → color).
# GUI-friendly self-contained variant — no toggle blocks.
#
# Same frozen-DiT EasyControl network as easycontrol.toml; the differences are
# the condition (synthetic mangafied B&W, cached to a parallel cond_cache_dir)
# and color-only captions (text_cache_dir). Both are wired through the dataset
# blueprint below.
#
# The GUI's EasyControl tab trains this via:
#   EASYADAPTER=colorize tasks.py easycontrol --methods_subdir gui-methods
# and preprocesses (mangafy + VAE-encode the cond) via:
#   EASYADAPTER=colorize tasks.py easycontrol-preprocess
# See easycontrol_adapters/colorization/ and docs/experimental/easycontrol.md.

dataset_config = "configs/datasets/colorize.toml"

network_module = "networks.methods.easycontrol"

network_dim = 32
network_alpha = 32

network_args = [
    "b_cond_init=-4.0",
    "cond_scale=1.0",
    "apply_ffn_lora=1",
]

output_name = "anima_colorize"
sigmoid_bias = 0

learning_rate = 2e-5
max_train_epochs = 3
save_every_n_epochs = 3
checkpointing_epochs = 3

use_easycontrol = true
easycontrol_drop_p = 0.0
masked_loss = false

caption_dropout_rate = 0.3
use_shuffled_caption_variants = true
use_shuffled_caption_variants_only = true
easycontrol_cond_noise_max = 0.0

blocks_to_swap = 0
gradient_checkpointing = true
unsloth_offload_checkpointing = true

use_cmmd = false

[variant]
family = "easycontrol"
label = "Colorize (B&W manga → color)"
description = "Colorize a B&W screentoned manga page. Cond = synthetic mangafied B&W (XDoG + screentone); text = color-only captions (hue). Empty prompt auto-colorizes; a color prompt steers."
order = 20
